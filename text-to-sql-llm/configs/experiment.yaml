models:
  generation: "gpt-4o-mini"
  disambiguation: "gpt-4o-mini"
  deepseek: "deepseek-chat"

parameters:
  embedding_model: "all-mpnet-base-v2"
  schema_threshold: 0.55
  max_candidates: 20
  retrieval_top_k: 50
  correction_attempts: 3
  temperature: 0.1
  max_tokens: 600

adaptive_k:
  easy: 1
  medium: 3
  hard: 5
  extra: 7

experiments:
  A_baseline_zero_shot:
    description: "Pure LLM tool - zero-shot with full schema"
    use_schema_linking: false
    use_retrieval: false
    use_self_correction: false
    use_ensemble: false

  B_baseline_few_shot:
    description: "LLM with manual 3-shot examples"
    use_schema_linking: false
    use_retrieval: false
    use_self_correction: false
    use_ensemble: false
    fixed_k: 3

  C_smart_driven:
    description: "Full SQL-Pilot pipeline"
    use_schema_linking: true
    use_retrieval: true
    use_self_correction: true
    use_ensemble: false

  D_smart_driven_correction:
    description: "SQL-Pilot with self-correction"
    use_schema_linking: true
    use_retrieval: true
    use_self_correction: true
    use_ensemble: false

  E_ensemble_voting:
    description: "SQL-Pilot with multi-model ensemble"
    use_schema_linking: true
    use_retrieval: true
    use_self_correction: true
    use_ensemble: true
