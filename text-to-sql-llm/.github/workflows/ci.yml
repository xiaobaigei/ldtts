name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        pip install -r requirements.txt
        pip install pytest pytest-cov flake8 black
    
    - name: Check formatting with black
      run: |
        black --check src/ tests/ || true
    
    - name: Lint with flake8
      run: |
        flake8 src/ tests/ --max-line-length=120 --ignore=E501,W503 || true
    
    - name: Run unit tests
      run: |
        pytest tests/ -v --cov=src/ --cov-report=html --cov-report=term || true
    
    - name: Run integration tests
      run: |
        pytest tests/test_e2e.py -v || true
    
    - name: Run ablation tests
      run: |
        pytest tests/test_ablation.py -v || true

  lint:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install linting tools
      run: |
        pip install black flake8
    
    - name: Check formatting
      run: |
        black --check src/ tests/ || echo "Formatting issues found"
    
    - name: Lint code
      run: |
        flake8 src/ tests/ --max-line-length=120 --ignore=E501,W503 || echo "Linting issues found"
